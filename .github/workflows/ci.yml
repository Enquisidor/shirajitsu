name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── TypeScript packages ────────────────────────────────────────────────────

  ts-build:
    name: TS — build shared types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shirajitsu/types build
      # Cache built types for downstream jobs
      - uses: actions/upload-artifact@v4
        with:
          name: types-dist
          path: shared/types/dist

  ts-typecheck:
    name: TS — typecheck all packages
    runs-on: ubuntu-latest
    needs: ts-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: types-dist
          path: shared/types/dist
      - run: pnpm --filter @shirajitsu/react typecheck
      - run: pnpm --filter @shirajitsu/core typecheck
      - run: pnpm --filter @shirajitsu/web typecheck

  ts-test:
    name: TS — test all packages
    runs-on: ubuntu-latest
    needs: ts-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: types-dist
          path: shared/types/dist
      - run: pnpm --filter @shirajitsu/react test
      - run: pnpm --filter @shirajitsu/core test

  # ── Go services ───────────────────────────────────────────────────────────

  go-test:
    name: Go — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, claim-extractor, source-evaluator, annotator]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - run: go vet ./...
      - run: go test ./...
