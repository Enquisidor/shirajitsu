name: deploy-web

on:
  workflow_run:
    workflows: [web]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: web workflow run ID to pull artifact from
        required: true

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve artifact run ID
        id: run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.event.workflow_run.head_sha || github.sha }}
          path: ui/web/dist
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive
        working-directory: ui/web
