name: Reusable — Go service build & deploy

on:
  workflow_call:
    inputs:
      service:
        description: Service name (matches services/<name>/ directory and Helm chart)
        required: true
        type: string
      image_tag:
        description: Docker image tag (defaults to short SHA)
        required: false
        type: string
        default: ${{ github.sha }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      GCP_PROJECT_ID:
        required: true
      GKE_CLUSTER:
        required: true
      GKE_REGION:
        required: true

jobs:
  build:
    name: Build — ${{ inputs.service }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.ref }}
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/${{ inputs.service }}/go.sum

      - name: Run tests
        working-directory: services/${{ inputs.service }}
        run: go test ./...

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set image ref
        id: image
        run: echo "ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.service }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ inputs.service }}
          push: true
          tags: ${{ steps.image.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy — ${{ inputs.service }}
    runs-on: ubuntu-latest
    needs: build   # deploy always depends on build succeeding
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy to GKE via Helm
        run: |
          helm upgrade --install ${{ inputs.service }} \
            infra/k8s/helm/${{ inputs.service }} \
            --namespace shirajitsu \
            --create-namespace \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.repository=gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.service }} \
            --wait \
            --timeout 5m
