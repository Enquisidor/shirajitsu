name: publish-sdk

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.2.3)
        required: true

jobs:
  publish:
    name: Publish sdk to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @shirajitsu/types build

      - name: Build sdk/core
        run: pnpm --filter @shirajitsu/core build

      - name: Set version
        run: pnpm --filter @shirajitsu/core version "${{ inputs.version || github.ref_name }}" --no-git-tag-version

      - name: Publish @shirajitsu/core
        run: pnpm --filter @shirajitsu/core publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
