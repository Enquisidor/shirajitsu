name: gateway

on:
  push:
    branches: [main]
    paths:
      - 'services/gateway/**'
      - '.github/workflows/gateway.yml'
  pull_request:
    paths:
      - 'services/gateway/**'
      - '.github/workflows/gateway.yml'
  workflow_dispatch:

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy
        working-directory: services/gateway
        run: go mod tidy

      - name: Vet
        working-directory: services/gateway
        run: go vet ./...

      - name: Test
        working-directory: services/gateway
        run: go test ./...

      - name: Build binary
        working-directory: services/gateway
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gateway ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-${{ github.sha }}
          path: services/gateway/gateway
          retention-days: 7
