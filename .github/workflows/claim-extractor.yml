name: claim-extractor

on:
  push:
    branches: [main]
    paths:
      - 'services/claim-extractor/**'
      - '.github/workflows/claim-extractor.yml'
  pull_request:
    paths:
      - 'services/claim-extractor/**'
      - '.github/workflows/claim-extractor.yml'
  workflow_dispatch:

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Tidy
        working-directory: services/claim-extractor
        run: go mod tidy

      - name: Vet
        working-directory: services/claim-extractor
        run: go vet ./...

      - name: Test
        working-directory: services/claim-extractor
        run: go test ./...

      - name: Build binary
        working-directory: services/claim-extractor
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o claim-extractor ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: claim-extractor-${{ github.sha }}
          path: services/claim-extractor/claim-extractor
          retention-days: 7
