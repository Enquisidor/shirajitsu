name: web

on:
  push:
    branches: [main]
    paths:
      - 'ui/web/**'
      - 'ui/components/**'
      - 'shared/types/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'ui/web/**'
      - 'ui/components/**'
      - 'shared/types/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

jobs:
  build:
    name: Test & Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --filter @shirajitsu/types build
          pnpm --filter @shirajitsu/react build

      - name: Typecheck
        run: pnpm --filter @shirajitsu/web typecheck

      - name: Test
        run: pnpm --filter @shirajitsu/web test

      - name: Build
        run: pnpm --filter @shirajitsu/web build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: ui/web/dist
          retention-days: 7
