name: deploy-source-evaluator

on:
  workflow_run:
    workflows: [source-evaluator]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: source-evaluator workflow run ID to pull artifact from
        required: true

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write
    env:
      SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve artifact run ID
        id: run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: source-evaluator-${{ env.SHA }}
          path: services/source-evaluator
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make binary executable
        run: chmod +x services/source-evaluator/source-evaluator

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Login to GCR
        run: gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin gcr.io

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/source-evaluator
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/source-evaluator:${{ env.SHA }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm upgrade --install source-evaluator \
            infra/k8s/helm/source-evaluator \
            --namespace shirajitsu \
            --create-namespace \
            --set image.tag=${{ env.SHA }} \
            --set image.repository=gcr.io/${{ secrets.GCP_PROJECT_ID }}/source-evaluator \
            --wait \
            --timeout 5m
