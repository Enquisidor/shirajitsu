apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  namespace: shirajitsu
  labels:
    app: gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: {{ .Values.env.REDIS_ADDR }}
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: shirajitsu-secrets
                  key: clerk-secret-key
            - name: CLAIM_EXTRACTOR_URL
              value: http://claim-extractor:8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
